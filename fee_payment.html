<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fee Payment</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:Segoe UI,Arial;
    background:#f1f5f9;
    padding:20px;
}

/* Loading */
.loader-wrap{
    height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:12px;
}
.spinner{
    width:42px;
    height:42px;
    border:4px solid #cbd5e1;
    border-top:4px solid #2563eb;
    border-radius:50%;
    animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.banner-logo {
    max-width: 400px;
    width: 100%;
    height: auto;
    margin-bottom: 50px; /* Space between logo and buttons */
}

#homeBtn {
    text-decoration: none;
    color: white;
    font-weight: 600;
    background-color: #698f80;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
}

#homeBtn:hover {
    background-color: #8392af;
}

/* Container */
.card{
    max-width:700px;
    margin: auto;
    background:#fff;
    padding:24px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.page-head {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 6px;
    margin-top: 4px;
    background-color: #94a3b8;
    font-size: 18px;
    font-weight: bold;
}

/* Search */
.search-box{position:relative;margin-bottom:15px}

input{
    width:100%;
    padding:12px;
    margin-top: 8px;
    border-radius:8px;
    border:1px solid #cbd5e1;
    font-size:14px;
}

.suggestions{
    position:absolute;
    width:100%;
    background:#fff;
    border:1px solid #e2e8f0;
    border-radius:8px;
    max-height:220px;
    overflow:auto;
    z-index:10;
}
.suggestions div{
    padding:10px;
    cursor:pointer;
}
.suggestions div:hover{background:#f1f5f9}

/* Student Card */
.student{
    background:#f8fafc;
    padding:16px;
    border-radius:10px;
    margin-top:12px;
    line-height:1.7;
}

/* Buttons */
button{
    width:100%;
    margin-top:15px;
    padding:13px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:#fff;
    font-weight:600;
    cursor:pointer;
}
button:disabled{background:#94a3b8}

.pay-area{display:none;margin-top:10px}

select{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:8px;
    border:1px solid #cbd5e1;
    font-size:14px;
    background:#fff;
    cursor:pointer;
    appearance:none;          /* remove default arrow */
    -webkit-appearance:none;
    -moz-appearance:none;
}

/* custom dropdown arrow */
.select-wrap{
    position:relative;
}
.select-wrap:after{
    content:"▼";
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    font-size:12px;
    color:#64748b;
    pointer-events:none;
}

.due-wrapper{
    margin-top:10px;
}

.due-label{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:14px;
    cursor:pointer;
}

input[type="checkbox"]{
    width:16px;
    height:16px;
    margin:0;
    padding:0;
}

</style>

</head>

<body>

<div id="loading" class="loader-wrap">
    <div class="spinner"></div>
    <div>Loading students...</div>
</div>

<div id="app" class="card" style="display:none">

<div style="text-align:center;">
    <img src="assets/banner_logo.png" alt="Institution Logo" class="banner-logo">
</div>

<div style="display:flex;justify-content:center;align-items:center;">
    <a id="homeBtn" href="./index.html"><span style="font-size:smaller">&#9664;</span> Back</a>
</div>

<div class="page-head">
    <span>Fee Payment</span>
</div>

<div class="search-box">
    <input id="search" placeholder="Search by Admission No or Name" autocomplete="off">
    <div id="suggestions" class="suggestions"></div>
</div>

<div id="student" class="student" style="display:none"></div>

<button id="payBtn" style="display:none;">Pay Now</button>

<div id="payArea" class="pay-area">

    <!-- Amount -->
    <input id="amount" type="number" placeholder="Enter amount">

    <!-- Payment Method -->
    <div class="select-wrap">
        <select id="method">
            <option value="CASH" selected>CASH</option>
            <option value="UPI">UPI</option>
            <option value="BANK">BANK</option>
        </select>
    </div>

    <!-- Due checkbox -->
    <div class="due-wrapper">
        <label class="due-label">
            <input type="checkbox" id="dueCheck">
            <span>Add due date</span>
        </label>
    </div>

    <!-- Due date -->
    <input id="dueDate" type="date" style="display:none;margin-top:6px;">

    <button id="confirmBtn">Confirm Payment</button>

</div>

</div>

<script>
let students = [];
let selected = null;

/* ---------- Load Students ---------- */
async function load(){
    try{
        const res = await fetch("http://127.0.0.1:8000/students");
        students = await res.json();

        document.getElementById("loading").style.display="none";
        document.getElementById("app").style.display="block";
    }catch(e){
        alert("Failed to load students");
    }
}
load();

/* ---------- Search ---------- */
const search = document.getElementById("search");
const sug = document.getElementById("suggestions");

search.oninput = ()=>{
    const q = search.value.toLowerCase();
    sug.innerHTML="";

    if(!q) return;

    const filtered = students.filter(s =>
        String(s.adm_no).includes(q) ||
        s.std_name.toLowerCase().includes(q)
    );

    filtered.forEach(s=>{
        const div=document.createElement("div");
        div.innerText = `${s.adm_no} - ${s.std_name}`;
        div.onclick=()=>selectStudent(s);
        sug.appendChild(div);
    });
};

/* ---------- Select Student ---------- */
function selectStudent(s){
    selected=s;
    sug.innerHTML="";
    search.value = `${s.adm_no} - ${s.std_name}`;

    const card = document.getElementById("student");
    card.style.display="block";
    card.innerHTML=`
        <b>Admission No:</b> ${s.adm_no}<br>
        <b>Name:</b> ${s.std_name}<br>
        <b>Class & Medium:</b> ${s.std_class} ${s.medium}<br>
        <b>Total Fee:</b> ${s.total_fee}<br>
        <b>Fee Reduction:</b> ${s.fee_reduction}<br>
        <b>Previously Paid:</b> ${s.prev_paid}<br>
        <b>Balance To Pay:</b> <strong style="color:blue;font-size:24px;">${s.balance}</strong>
    `;

    document.getElementById("payBtn").style.display = "block";
    document.getElementById("payBtn").disabled=false;
    document.getElementById("payArea").style.display="none";
    document.getElementById("dueCheck").checked=false;
    document.getElementById("dueDate").value=null;
    document.getElementById("dueDate").style.display="none";
}

/* ---------- Pay Now ---------- */
document.getElementById("payBtn").onclick=()=>{
    document.getElementById("payArea").style.display="block";
    document.getElementById("payBtn").disabled=true;
};

/* ---------- Confirm Payment ---------- */
document.getElementById("confirmBtn").onclick = async ()=>{
    const amt = Number(document.getElementById("amount").value);
    const method = document.getElementById("method").value;
    const due = dueCheck.checked ? dueDate.value : null;

    if(!amt || amt<=0) return alert("Enter valid amount");

    if(amt>selected.balance) return alert("Entered amount is more than balance to pay!");

    try{
        const res = await fetch("http://127.0.0.1:8000/pay-fee",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                student:selected,
                paying_amount:amt,
                payment_method:method,
                next_due:due
            })
        });
        
        const data = await res.json();
        
        if(data.success){
            sessionStorage.setItem("receipt", JSON.stringify(data.receipt));
            window.open("receipt.html","_blank");
            location.reload();
        }else{
            alert("Payment failed");
        }

        alert("Payment successful");
        location.reload();

    }catch(e){
        alert("Payment failed");
    }
};
const dueCheck = document.getElementById("dueCheck");
const dueDate = document.getElementById("dueDate");

dueCheck.onchange = () => {
    dueDate.style.display = dueCheck.checked ? "block" : "none";
};
</script>

</body>
</html>
